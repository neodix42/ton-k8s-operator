apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tonnodes.ton.ton.org
spec:
  group: ton.ton.org
  names:
    kind: TonNode
    listKind: TonNodeList
    plural: tonnodes
    singular: tonnode
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - jsonPath: .status.readyReplicas
          name: Ready
          type: integer
        - jsonPath: .status.serviceName
          name: Service
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                image:
                  type: string
                  default: ghcr.io/ton-blockchain/ton-docker-ctrl:latest
                replicas:
                  type: integer
                  format: int32
                  minimum: 1
                  default: 1
                storage:
                  type: object
                  properties:
                    tonWorkSize:
                      type: string
                      default: 200Gi
                    myTonCoreSize:
                      type: string
                      default: 20Gi
                    storageClassName:
                      type: string
                    accessModes:
                      type: array
                      items:
                        type: string
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                network:
                  type: object
                  properties:
                    globalConfigURL:
                      type: string
                      default: https://ton.org/global.config.json
                    validatorPort:
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 65535
                      default: 30001
                    liteServerPort:
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 65535
                      default: 30003
                    validatorConsolePort:
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 65535
                      default: 30002
                    publicIP:
                      type: string
                configRef:
                  type: object
                  properties:
                    name:
                      type: string
                env:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                readyReplicas:
                  type: integer
                  format: int32
                serviceName:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}

