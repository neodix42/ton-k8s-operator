{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ton-k8s-operator.fullname" . }}-controller-manager-metrics-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ton-k8s-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  ports:
    - name: https
      port: {{ .Values.metrics.service.port }}
      protocol: TCP
      targetPort: {{ .Values.metrics.service.port }}
  selector:
    {{- include "ton-k8s-operator.selectorLabels" . | nindent 4 }}
    control-plane: controller-manager
{{- end }}

