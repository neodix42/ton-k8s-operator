tonNode:
  enabled: true
  namespace: default
  name: tonnode
  image: ghcr.io/ton-blockchain/ton-docker-ctrl:latest
  replicas: 3
  storage:
    tonWorkSize: 200Gi
    myTonCoreSize: 20Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 16000m
      memory: 64Gi
    limits:
      cpu: 128000m
      memory: 256Gi
  nodeSelector: {}
  network:
    globalConfigURL: https://ton.org/global.config.json
    validatorPort: 30001
    liteServerPort: 30003
    validatorConsolePort: 30002
    hostPortsEnabled: true
    publicIP: ""
  keyManagement:
    enabled: true
    provider: vault
    credentialsSecretRef: ton-vault-creds
    vaultTransitKey: ton-validator
    kmsKeyID: ""
    kmsVendor: aws
    inMemory:
      keysSizeLimit: 128Mi
      walletsSizeLimit: 512Mi
    encryptedBundle:
      pvcSize: 5Gi
      storageClassName: encrypted-sc
      accessModes:
        - ReadWriteOnce
      fileName: keys.bundle.enc
      metaFileName: keys.bundle.meta
    agent:
      image: ghcr.io/ton-blockchain/ton-docker-ctrl:latest
      resources: {}
  env:
    - name: TON_BRANCH
      value: latest
    - name: ARCHIVE_TTL
      value: "86400"
    - name: STATE_TTL
      value: "86400"
    - name: SYNC_BEFORE
      value: "60"
    - name: VERBOSITY
      value: "3"
    - name: IGNORE_MINIMAL_REQS
      value: "false"
    - name: TELEMETRY
      value: "true"
    - name: MODE
      value: liteserver
    - name: DUMP
      value: "true"
    - name: MYTONCTRL_VERSION
      value: master
